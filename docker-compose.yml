version: '3'
services:

  keygen:
    profiles:
      - setup
    build: .
    # image: kitsuyui/docker-ssh
    user: "0:0"
    volumes:
      - ./home_ssh:/home/sshuser/.ssh
    command:
      - sh
      - -eu
      - -c
      - |
        mkdir -p /home/sshuser/.ssh
        chown sshuser:sshuser /home/sshuser/.ssh
        chmod 700 /home/sshuser/.ssh
        private_key_path=/home/sshuser/.ssh/id_ed25519
        public_key_path="$${private_key_path}.pub"
        for key_path in "$$private_key_path" "$$public_key_path"; do
          if [ -L "$$key_path" ]; then
            echo "$$key_path must not be a symlink; remove it before regenerating." >&2
            exit 1
          fi
        done
        if [ -e "$$private_key_path" ] || [ -e "$$public_key_path" ]; then
          if [ -e "$$private_key_path" ] && [ -e "$$public_key_path" ]; then
            echo "$$private_key_path and $$public_key_path already exist; remove both before regenerating." >&2
          elif [ -e "$$private_key_path" ]; then
            echo "$$private_key_path exists but $$public_key_path is missing; restore the missing public key or remove the private key before regenerating." >&2
          else
            echo "$$public_key_path exists but $$private_key_path is missing; remove the stale public key before regenerating." >&2
          fi
          exit 1
        fi
        ssh-keygen -t ed25519 -f "$$private_key_path" -N ""
        chown sshuser:sshuser "$$private_key_path" "$$public_key_path"
        chmod 600 "$$private_key_path"
        chmod 644 "$$public_key_path"

  example_left_forward_8080:
    profiles:
      - forwarding
    restart: on-failure
    # -L (local forward) binds the tunnel port on the container's loopback by
    # default. Docker's bridge network isolates the container, so the Docker
    # host cannot reach that loopback port directly.
    #
    # To make the tunnel accessible from the Docker host, choose one option:
    #
    # Option A — enable host network mode (uncomment the line below). The
    # container shares the host's network stack, so the tunnel appears on
    # host 127.0.0.1:8080 directly. Simple, but removes network isolation.
    #
    # Option B — bind the tunnel to all container interfaces and expose the
    # port via Docker's port mapping. Change the command to
    # "-L 0.0.0.0:8080:127.0.0.1:8080" and add a "ports:" section. Docker
    # proxies host:8080 → container:8080. Preserves network isolation.
    #
    # network_mode: host
    build: .
    # image: kitsuyui/docker-ssh
    volumes:
      - ./home_ssh:/home/sshuser/.ssh
    command:
      - ssh
      - -o
      - StrictHostKeyChecking=accept-new
      - -o
      - ServerAliveInterval=15
      - -o
      - ServerAliveCountMax=3
      - -o
      - ExitOnForwardFailure=yes
      - -N
      - -L
      - 8080:127.0.0.1:8080
      - examplehost

  example_right_forward_8080:
    profiles:
      - forwarding
    restart: on-failure
    # -R (remote forward) binds the port on the remote host (examplehost), not
    # locally. Docker network isolation does not affect reachability from the
    # Docker host for this direction, so network_mode: host is not required here.
    # network_mode: host
    build: .
    # image: kitsuyui/docker-ssh
    volumes:
      - ./home_ssh:/home/sshuser/.ssh
    # GatewayPorts=clientspecified is needed in examplehost's /etc/ssh/sshd_config,
    # and the client must request a non-loopback bind address.
    command:
      - ssh
      - -o
      - StrictHostKeyChecking=accept-new
      - -o
      - ServerAliveInterval=15
      - -o
      - ServerAliveCountMax=3
      - -o
      - ExitOnForwardFailure=yes
      - -N
      - -R
      - 0.0.0.0:8080:127.0.0.1:8080
      - examplehost
