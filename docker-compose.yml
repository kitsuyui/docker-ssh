version: '3'
services:

  keygen:
    profiles:
      - setup
    build: .
    # image: kitsuyui/docker-ssh
    user: "0:0"
    volumes:
      - ./home_ssh:/home/sshuser/.ssh
    command:
      - sh
      - -eu
      - -c
      - |
        mkdir -p /home/sshuser/.ssh
        chown sshuser:sshuser /home/sshuser/.ssh
        chmod 700 /home/sshuser/.ssh
        private_key_path=/home/sshuser/.ssh/id_ed25519
        public_key_path="$${private_key_path}.pub"
        for key_path in "$$private_key_path" "$$public_key_path"; do
          if [ -L "$$key_path" ]; then
            echo "$$key_path must not be a symlink; remove it before regenerating." >&2
            exit 1
          fi
        done
        if [ -e "$$private_key_path" ]; then
          echo "$$private_key_path already exists; remove it before regenerating." >&2
          exit 1
        fi
        ssh-keygen -t ed25519 -f "$$private_key_path" -N ""
        chown sshuser:sshuser "$$private_key_path" "$$public_key_path"
        chmod 600 "$$private_key_path"
        chmod 644 "$$public_key_path"

  example_left_forward_8080:
    profiles:
      - forwarding
    # network_mode: host
    build: .
    # image: kitsuyui/docker-ssh
    volumes:
      - ./home_ssh:/home/sshuser/.ssh
    command: ssh -o StrictHostKeyChecking=accept-new -o ServerAliveInterval=15 -o ServerAliveCountMax=3 -o ExitOnForwardFailure=yes -N -L 8080:127.0.0.1:8080 examplehost

  example_right_forward_8080:
    profiles:
      - forwarding
    # network_mode: host
    build: .
    # image: kitsuyui/docker-ssh
    volumes:
      - ./home_ssh:/home/sshuser/.ssh
    # GatewayPorts=clientspecified is needed in examplehost's /etc/ssh/sshd_config,
    # and the client must request a non-loopback bind address.
    command: ssh -o StrictHostKeyChecking=accept-new -o ServerAliveInterval=15 -o ServerAliveCountMax=3 -o ExitOnForwardFailure=yes -N -R 0.0.0.0:8080:127.0.0.1:8080 examplehost
